<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Market Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,-apple-system,sans-serif;background:#f5f7fa;color:#1a1a2e}
.header{background:#2b5797;color:#fff;padding:20px 32px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:22px;font-weight:600}.header .date{font-size:13px;opacity:.85}
.container{max-width:1200px;margin:0 auto;padding:24px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card h2{font-size:15px;font-weight:600;color:#555;margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px}
.card.full{grid-column:1/-1}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:10px 8px;border-bottom:2px solid #e8ecf1;color:#666;font-weight:600;font-size:12px;text-transform:uppercase}
td{padding:10px 8px;border-bottom:1px solid #f0f2f5}.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600}
.badge.up{background:#e3fce8;color:#0d7c34}.badge.down{background:#fce8e8;color:#b91c1c}.badge.stable{background:#f0f2f5;color:#666}
.warning-item{padding:12px 0;border-bottom:1px solid #f0f2f5}
.warning-item .company{font-weight:600}.warning-item .meta{font-size:13px;color:#777;margin-top:2px}
.export-bar{display:flex;gap:10px;margin-bottom:20px}
.btn{padding:8px 18px;border:none;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none}
.btn-primary{background:#2b5797;color:#fff}.btn-outline{background:#fff;color:#2b5797;border:1px solid #2b5797}
@media(max-width:768px){.grid{grid-template-columns:1fr}}
.loading{text-align:center;padding:60px;color:#888}
</style></head><body>
<div class="header"><div><h1>Market Intelligence Dashboard</h1><div class="date" id="headerDate"></div></div>
<div style="display:flex;gap:8px"><label style="font-size:13px">Days</label>
<select id="daysSelect" onchange="loadData()" style="padding:4px 8px;border-radius:4px;border:1px solid #ccc;font-size:13px">
<option value="30">30</option><option value="90" selected>90</option><option value="180">180</option></select></div></div>
<div class="container">
<div class="export-bar"><a class="btn btn-primary" id="exportCsv" href="#">CSV</a><a class="btn btn-outline" id="exportPdf" href="#">PDF</a></div>
<div id="loading" class="loading">Loading market intelligence data...</div>
<div id="content" style="display:none">
<div class="grid"><div class="card"><h2>Top Growing Roles</h2><canvas id="rolesChart"></canvas></div>
<div class="card"><h2>Industry Pulse</h2><canvas id="industryChart"></canvas></div></div>
<div class="grid"><div class="card full"><h2>Role Breakdown</h2>
<table><thead><tr><th>Role</th><th>Growth</th><th>Direction</th><th>Volume</th></tr></thead><tbody id="rolesBody"></tbody></table></div></div>
<div class="grid"><div class="card full"><h2>Early Warnings</h2><div id="warningsContainer"><p style="color:#888;font-size:14px">No early warnings detected.</p></div></div></div>
</div></div>
<script>
let rc=null,ic=null;
async function loadData(){const d=document.getElementById('daysSelect').value;document.getElementById('loading').style.display='block';document.getElementById('content').style.display='none';
try{const[t,r,i,w]=await Promise.all([fetch('/api/market-intelligence/trends?days='+d),fetch('/api/market-intelligence/top-roles?days='+d+'&limit=10'),fetch('/api/market-intelligence/industry-pulse?days='+d),fetch('/api/market-intelligence/early-warnings?min_confidence=0.3')]);
const tr=await t.json(),rr=await r.json(),ir=await i.json(),wr=await w.json();
document.getElementById('exportCsv').href='/api/market-intelligence/trends/export?fmt=csv&days='+d;document.getElementById('exportPdf').href='/api/market-intelligence/trends/export?fmt=pdf&days='+d;
renderRoles(rr.roles||[]);renderIndustry(ir.industries||[]);renderTable(rr.roles||[]);renderWarnings(wr.warnings||[]);
document.getElementById('headerDate').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
document.getElementById('loading').style.display='none';document.getElementById('content').style.display='block'}catch(e){document.getElementById('loading').textContent='Failed to load data.';document.getElementById('loading').className='error'}}
function renderRoles(r){const c=document.getElementById('rolesChart').getContext('2d');if(rc)rc.destroy();const lb=r.map(x=>x.category.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()));const gr=r.map(x=>+(x.growth_rate*100).toFixed(1));
rc=new Chart(c,{type:'bar',data:{labels:lb,datasets:[{label:'Growth Rate %',data:gr,backgroundColor:gr.map(v=>v>=0?'#2b5797':'#b91c1c'),borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>v+'%'}}}}})}
function renderIndustry(p){const c=document.getElementById('industryChart').getContext('2d');if(ic)ic.destroy();const lb=p.map(x=>x.category.charAt(0).toUpperCase()+x.category.slice(1));const gr=p.map(x=>+(x.growth_rate*100).toFixed(1));
ic=new Chart(c,{type:'bar',data:{labels:lb,datasets:[{label:'Industry Growth %',data:gr,backgroundColor:gr.map(v=>v>=0?'#27ae60':'#e74c3c'),borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>v+'%'}}}}})}
function renderTable(r){document.getElementById('rolesBody').innerHTML=r.map(x=>{const d=x.direction;return'<tr><td><strong>'+x.category.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())+'</strong></td><td>'+(x.growth_rate*100).toFixed(1)+'%</td><td><span class="badge '+d+'">'+d+'</span></td><td>'+x.points.reduce((s,p)=>s+p.value,0)+'</td></tr>'}).join('')}
function renderWarnings(w){const c=document.getElementById('warningsContainer');if(!w||!w.length){c.innerHTML='<p style="color:#888;font-size:14px">No early warnings detected.</p>';return}
c.innerHTML=w.map(x=>'<div class="warning-item"><div class="company">'+x.company+'</div><div style="font-size:14px">'+x.headline+'</div><div class="meta">'+x.signal_type.replace(/_/g,' ')+' &middot; '+(x.confidence*100).toFixed(0)+'% confidence'+(x.predicted_hiring_window_days?' &middot; Hiring in ~'+x.predicted_hiring_window_days+'d':'')+'</div></div>').join('')}
loadData();
</script></body></html>
