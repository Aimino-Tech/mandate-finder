name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/
      - run: mypy src/ --ignore-missing-imports
      - run: pytest tests/ -v --tb=short --ignore=tests/test_e2e.py --ignore=tests/test_export.py --ignore=tests/test_notification.py --ignore=tests/test_report_generator.py --ignore=tests/test_trend_detector.py --ignore=tests/test_early_signal_scraper.py --ignore=tests/test_industry_classifier.py
